<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presentation</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .prezi-wrap {
      position: relative;
      width: 100vw;
      height: min(56.25vw, 85vh);
    }

    .prezi-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ── Password overlay ── */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      background: rgba(10, 12, 20, 0.90);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 24px;
      transition: opacity 0.5s ease;
    }

    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .lock-icon {
      width: 52px;
      height: 52px;
      opacity: 0.75;
      color: #fff;
    }

    .overlay-title {
      font-size: 1.3rem;
      font-weight: 500;
      color: #ffffff;
      letter-spacing: 0.04em;
      text-align: center;
    }

    .overlay-note {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.45);
      text-align: center;
      max-width: 300px;
      line-height: 1.6;
    }

    .input-row {
      display: flex;
      gap: 0;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      overflow: hidden;
      width: 100%;
      max-width: 300px;
    }

    #pwInput {
      flex: 1;
      padding: 12px 16px;
      background: rgba(255,255,255,0.07);
      border: none;
      outline: none;
      color: #fff;
      font-size: 1rem;
      letter-spacing: 0.1em;
    }

    #pwInput::placeholder {
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.04em;
    }

    #unlockBtn {
      padding: 12px 18px;
      background: rgba(255,255,255,0.12);
      border: none;
      border-left: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #unlockBtn:hover {
      background: rgba(255,255,255,0.22);
    }

    .error-msg {
      font-size: 0.78rem;
      color: #ff6b6b;
      height: 16px;
      text-align: center;
      transition: opacity 0.3s;
    }

    .device-note {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.3);
      text-align: center;
      max-width: 280px;
      line-height: 1.7;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 20px;
    }

    .device-note span {
      color: rgba(255,255,255,0.55);
    }
  </style>
</head>
<body>

  <!-- Prezi embed -->
  <div class="prezi-wrap">
    <iframe
      src="https://prezi.com/p/embed/UuMupJnldJYBJrRKzkD7/"
      id="iframe_container"
      frameborder="0"
      webkitallowfullscreen
      mozallowfullscreen
      allowfullscreen
      allow="autoplay; fullscreen"
    ></iframe>
  </div>

  <!-- Password overlay -->
  <div id="overlay">

    <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>

    <div class="overlay-title">Enter password to continue</div>

    <div class="input-row">
      <input
        type="password"
        id="pwInput"
        placeholder="Password"
        autocomplete="off"
        autofocus
      />
      <button id="unlockBtn" onclick="checkPassword()">Unlock</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="device-note">
      <span>✦ For the smoothest experience,</span> opening this on a desktop or laptop is recommended — the presentation is best explored on a larger screen.
    </div>

  </div>

  <script>
    // ── Set your password here ──
    const PASSWORD = "myprez";

    const input = document.getElementById('pwInput');
    const errorMsg = document.getElementById('errorMsg');

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') checkPassword();
    });

    function checkPassword() {
      if (input.value === PASSWORD) {
        const overlay = document.getElementById('overlay');
        overlay.classList.add('hidden');
        setTimeout(() => overlay.style.display = 'none', 500);
      } else {
        errorMsg.textContent = 'Incorrect password. Please try again.';
        input.value = '';
        input.focus();
        setTimeout(() => errorMsg.textContent = '', 2500);
      }
    }
  </script>

</body>
</html>
